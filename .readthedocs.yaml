version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    post_create_environment:
      - pip install poetry poetry-plugin-export
      - poetry export --with docs --without-hashes -o requirements.txt

python:
  install:
    - requirements: requirements.txt
    - method: pip
      path: .

sphinx:
  builder: html
  configuration: docs/conf.py
